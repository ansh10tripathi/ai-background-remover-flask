<!DOCTYPE html>
<html>

<head>

<title>AI Background Remover</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>AI Background Remover</h1>

<form method="POST" action="/" enctype="multipart/form-data">

<input type="file" name="image" id="fileInput" accept="image/*" style="display:none;" required>

<div class="drop-area" id="dropArea">
<p>Drag & Drop Image</p>
<p>or Click to Upload</p>
</div>

<img id="preview">

<br>

<button type="submit">Remove Background</button>

</form>


{% if output_image %}

<h2>Before vs After</h2>

<div class="compare-images">

<div class="image-box">
<h3>Original</h3>
<img src="{{ original_image }}">
</div>

<div class="image-box">
<h3>Background Removed</h3>
<img src="{{ output_image }}">
</div>

</div>

<br>

<a href="{{ output_image }}" download="bg_removed.png">
<button>Download Image</button>
</a>

{% endif %}

<script>

const dropArea = document.getElementById("dropArea")
const fileInput = document.getElementById("fileInput")
const preview = document.getElementById("preview")

dropArea.onclick = () => fileInput.click()

fileInput.addEventListener("change", function(){

const file = this.files[0]
preview.src = URL.createObjectURL(file)

})

dropArea.addEventListener("dragover", e=>{
e.preventDefault()
dropArea.classList.add("dragover")
})

dropArea.addEventListener("dragleave", ()=>{
dropArea.classList.remove("dragover")
})

dropArea.addEventListener("drop", e=>{

e.preventDefault()

fileInput.files = e.dataTransfer.files

preview.src = URL.createObjectURL(e.dataTransfer.files[0])

})

</script>

</body>
</html>
